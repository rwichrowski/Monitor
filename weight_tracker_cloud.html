<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Wagi Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="config.js"></script>

    <script>
        let auth, db;
        let currentUser = null;
        let weightEntries = [];
        let chartInstance = null;
        let scatterInstance = null;
        const appId = 'weight-tracker-cloud';

        // Inicjalizacja Firebase
        const initFirebase = async () => {
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');

            if (typeof firebaseConfig === 'undefined') {
                statusText.innerText = "Brak pliku config.js!";
                statusIcon.classList.add('text-red-500');
                return;
            }

            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();

            try {
                await auth.signInAnonymously();

                auth.onAuthStateChanged((user) => {
                    if (user) {
                        currentUser = user;
                        statusIcon.classList.add('text-green-500', 'animate-pulse');
                        statusText.innerText = "Połączono z Firebase";
                        startSync();
                    }
                });
            } catch (error) {
                console.error("Auth Error:", error);
                statusText.innerText = "Błąd autoryzacji";
            }
        };

        // Pobieranie danych w czasie rzeczywistym
        const startSync = () => {
            const uid = (typeof userId !== 'undefined') ? userId : currentUser.uid;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 30);
            const cutoffDate = cutoff.toISOString().split('T')[0];

            const path = db.collection('artifacts').doc(appId)
                           .collection('users').doc(uid)
                           .collection('weights')
                           .where('date', '>=', cutoffDate);

            path.onSnapshot((snapshot) => {
                weightEntries = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                weightEntries.sort((a, b) => new Date(a.date) - new Date(b.date));
                updateUI();
            }, (error) => {
                console.error("Firestore error:", error);
            });
        };

        // Dodawanie wpisu
        window.addEntry = async () => {
            const weightInput = document.getElementById('weightValue');
            const caloriesInput = document.getElementById('caloriesValue');
            const burnedInput = document.getElementById('burnedCaloriesValue');
            const dateInput = document.getElementById('weightDate');
            const weight = parseFloat(weightInput.value);
            const calories = parseInt(caloriesInput.value);
            const burnedCalories = parseInt(burnedInput.value);
            const date = dateInput.value;

            if (!currentUser || isNaN(weight) || !date) {
                showToast("Wprowadź poprawne dane");
                return;
            }

            try {
                const uid = (typeof userId !== 'undefined') ? userId : currentUser.uid;
                await db.collection('artifacts').doc(appId)
                    .collection('users').doc(uid)
                    .collection('weights').doc(date).set({
                        date,
                        weight,
                        calories: isNaN(calories) ? null : calories,
                        burnedCalories: isNaN(burnedCalories) ? null : burnedCalories,
                        timestamp: Date.now()
                    });
                showToast("Zapisano!");
            } catch (e) {
                showToast("Błąd zapisu");
            }
        };

        // Usuwanie wpisu
        window.deleteEntry = async (id) => {
            if (!confirm(`Usunąć wpis z dnia ${id}?`)) return;
            try {
                const uid = (typeof userId !== 'undefined') ? userId : currentUser.uid;
                await db.collection('artifacts').doc(appId)
                    .collection('users').doc(uid)
                    .collection('weights').doc(id).delete();
                showToast("Usunięto");
            } catch (e) { showToast("Błąd usuwania"); }
        };

        function fillFormForDate(date) {
            const entry = weightEntries.find(e => e.date === date);
            const weightInput = document.getElementById('weightValue');
            const caloriesInput = document.getElementById('caloriesValue');
            const burnedInput = document.getElementById('burnedCaloriesValue');
            const btn = document.getElementById('addBtn');
            if (entry) {
                weightInput.value = entry.weight ?? '';
                caloriesInput.value = entry.calories ?? '';
                burnedInput.value = entry.burnedCalories ?? '';
                btn.textContent = 'Zaktualizuj wpis';
            } else {
                weightInput.value = '';
                caloriesInput.value = '';
                burnedInput.value = '';
                btn.textContent = 'Dodaj do bazy';
            }
        }

        function updateUI() {
            renderTable();
            renderChart();
            renderScatter();
            fillFormForDate(document.getElementById('weightDate').value);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function renderTable() {
            const historyBody = document.getElementById('historyBody');
            const sorted = [...weightEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
            historyBody.innerHTML = sorted.map(e => `
                <tr class="border-b border-slate-700/50 hover:bg-slate-700/20 transition-colors">
                    <td class="py-3 px-4">${e.date}</td>
                    <td class="py-3 px-4 font-bold text-blue-400">${e.weight.toFixed(1)} kg</td>
                    <td class="py-3 px-4 font-bold text-green-400">${e.calories ? e.calories + ' kcal' : '-'}</td>
                    <td class="py-3 px-4 font-bold text-orange-400">${e.burnedCalories ? e.burnedCalories + ' kcal' : '-'}</td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="deleteEntry('${e.id}')" class="text-red-400 hover:scale-110 transition-transform">
                             <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderChart() {
            const canvas = document.getElementById('weightChart');
            const ctx = canvas.getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tickColor = isDark ? '#94a3b8' : '#64748b';

            const weights = weightEntries.map(e => e.weight).filter(Boolean);
            const pad = 2;
            const yMin = weights.length ? Math.floor(Math.min(...weights) - pad) : 0;
            const yMax = weights.length ? Math.ceil(Math.max(...weights) + pad) : 120;

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weightEntries.map(e => e.date),
                    datasets: [{
                        type: 'line',
                        label: 'Waga (kg)',
                        data: weightEntries.map(e => e.weight),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y',
                        order: 1
                    }, {
                        type: 'bar',
                        label: 'Netto (kcal)',
                        data: weightEntries.map(e => e.calories ? e.calories - (e.burnedCalories || 0) : null),
                        backgroundColor: 'rgba(16, 185, 129, 0.55)',
                        borderColor: '#10b981',
                        borderWidth: 1,
                        yAxisID: 'y1',
                        stack: 'cal',
                        order: 2
                    }, {
                        type: 'bar',
                        label: 'Spalone (kcal)',
                        data: weightEntries.map(e => e.burnedCalories || null),
                        backgroundColor: 'rgba(110, 231, 183, 0.55)',
                        borderColor: '#6ee7b7',
                        borderWidth: 1,
                        yAxisID: 'y1',
                        stack: 'cal',
                        order: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            min: yMin,
                            max: yMax,
                            ticks: { color: tickColor }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            stacked: true,
                            ticks: { color: tickColor },
                            grid: { drawOnChartArea: false }
                        },
                        x: { ticks: { color: tickColor } }
                    }
                }
            });
        }

        function isoWeekKey(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            const day = d.getDay() || 7;
            d.setDate(d.getDate() + 4 - day);
            const jan1 = new Date(d.getFullYear(), 0, 1);
            const w = Math.ceil((((d - jan1) / 86400000) + 1) / 7);
            return `${d.getFullYear()}-W${String(w).padStart(2, '0')}`;
        }

        function saveTDEE(val) {
            localStorage.setItem('tdee', val);
        }

        function renderScatter() {
            const canvas = document.getElementById('scatterChart');
            const ctx = canvas.getContext('2d');
            if (scatterInstance) scatterInstance.destroy();

            const tdee = parseInt(document.getElementById('tdeeValue').value) || 2000;
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tickColor = isDark ? '#94a3b8' : '#64748b';

            const weekMap = {};
            weightEntries.forEach(e => {
                const wk = isoWeekKey(e.date);
                if (!weekMap[wk]) weekMap[wk] = { weights: [] };
                if (e.weight) weekMap[wk].weights.push(e.weight);
            });

            const weeks = Object.keys(weekMap).sort();

            const firstWeights = weeks.length ? weekMap[weeks[0]].weights : [];
            const startWeight = firstWeights.length
                ? firstWeights.reduce((a, b) => a + b, 0) / firstWeights.length
                : null;

            let cumBal = 0;
            const cumBalByWeek = {};
            weightEntries.forEach(e => {
                if (e.calories) cumBal += e.calories - tdee - (e.burnedCalories || 0);
                cumBalByWeek[isoWeekKey(e.date)] = cumBal;
            });

            const labels = weeks.map(w => {
                const m = w.match(/(\d{4})-W(\d+)/);
                return m ? `T${parseInt(m[2])}/${m[1].slice(2)}` : w;
            });

            const weightChanges = weeks.map(wk => {
                const ws = weekMap[wk].weights;
                if (!ws.length || startWeight === null) return null;
                return +((ws.reduce((a, b) => a + b, 0) / ws.length - startWeight).toFixed(2));
            });

            const cumulativeBals = weeks.map(wk =>
                cumBalByWeek[wk] !== undefined ? Math.round(cumBalByWeek[wk]) : null
            );

            scatterInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Zmiana wagi (kg)',
                            data: weightChanges,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.1)',
                            yAxisID: 'y',
                            tension: 0.3,
                            pointRadius: 4,
                            spanGaps: true
                        },
                        {
                            label: 'Bilans kcal (skum.)',
                            data: cumulativeBals,
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245,158,11,0.08)',
                            yAxisID: 'y1',
                            tension: 0.3,
                            pointRadius: 4,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (item) => item.datasetIndex === 0
                                    ? `Waga: ${item.raw > 0 ? '+' : ''}${item.raw} kg`
                                    : `Bilans: ${item.raw > 0 ? '+' : ''}${item.raw} kcal`
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: 'Zmiana wagi (kg)', color: tickColor },
                            ticks: { color: tickColor }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: 'Bilans kcal', color: tickColor },
                            ticks: { color: tickColor },
                            grid: { drawOnChartArea: false }
                        },
                        x: { ticks: { color: tickColor } }
                    }
                }
            });
        }

        function calcBurnedCalories(activity, quantity) {
            const weight = weightEntries.length > 0
                ? weightEntries[weightEntries.length - 1].weight
                : 117;
            const MET = { trucht: 8.7, rower: 7.5, silownia: 4.0 }[activity];
            const hours = activity === 'trucht' ? quantity / (60 / 7)
                        : activity === 'rower'  ? quantity / 18
                        : quantity / 60;
            return Math.round(MET * weight * hours);
        }

        window.addActivityCalc = () => {
            const activity = document.getElementById('activitySelect').value;
            const quantity = parseFloat(document.getElementById('activityQuantity').value);
            if (isNaN(quantity) || quantity <= 0) return;
            const burned = calcBurnedCalories(activity, quantity);
            const current = parseInt(document.getElementById('burnedCaloriesValue').value) || 0;
            document.getElementById('burnedCaloriesValue').value = current + burned;
            document.getElementById('activityQuantity').value = '';
            showToast(`+${burned} kcal spalonych`);
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        window.onload = () => {
            document.getElementById('weightDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('weightDate').addEventListener('change', (e) => {
                fillFormForDate(e.target.value);
            });
            const savedTDEE = localStorage.getItem('tdee');
            if (savedTDEE) document.getElementById('tdeeValue').value = savedTDEE;
            initFirebase();
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1.5rem; }
        input, select { background: #1e293b; color: white; border: 1px solid #334155; padding: 0.5rem; border-radius: 0.5rem; outline: none; }
        input:focus, select:focus { border-color: #3b82f6; }
        select option { background: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="scale" class="text-blue-500"></i> Cloud Weight
            </h1>
            <div class="flex items-center gap-2 text-xs opacity-70">
                <i id="statusIcon" data-lucide="cloud" class="w-4 h-4"></i>
                <span id="statusText">Łączenie...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card space-y-4 h-fit">
                <h2 class="font-semibold text-lg">Nowy pomiar</h2>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] uppercase font-bold opacity-50">Data</label>
                    <input type="date" id="weightDate">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] uppercase font-bold opacity-50">Waga (kg)</label>
                    <input type="number" id="weightValue" step="0.1" placeholder="00.0">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] uppercase font-bold opacity-50">Spożyte kalorie (kcal)</label>
                    <input type="number" id="caloriesValue" step="1" placeholder="0000">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] uppercase font-bold opacity-50">Spalone kalorie (kcal)</label>
                    <input type="number" id="burnedCaloriesValue" step="1" placeholder="0">
                </div>
                <div class="rounded-lg border border-slate-700/60 p-2 space-y-2">
                    <label class="text-[10px] uppercase font-bold opacity-40">Kalkulator aktywności</label>
                    <div class="flex gap-1 items-center">
                        <select id="activitySelect" class="flex-1 text-xs py-1 px-1">
                            <option value="trucht">Trucht (km)</option>
                            <option value="rower">Rower (km)</option>
                            <option value="silownia">Siłownia (min)</option>
                        </select>
                        <input type="number" id="activityQuantity" step="0.5" min="0" placeholder="5" class="w-14 text-center text-xs">
                        <button onclick="addActivityCalc()" class="px-3 py-1 bg-orange-600 hover:bg-orange-700 text-white rounded-lg text-sm font-bold transition-all active:scale-95">+</button>
                    </div>
                </div>
                <button id="addBtn" onclick="addEntry()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                    Dodaj do bazy
                </button>
            </div>

            <div class="card md:col-span-2">
                <h2 class="font-semibold mb-4 text-lg">Wykres postępów</h2>
                <div class="h-[250px]">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-semibold text-lg">Bilans kalorii vs zmiana wagi (tygodniowo)</h2>
                <div class="flex items-center gap-2 text-xs opacity-60">
                    <label for="tdeeValue" class="uppercase font-bold">TDEE</label>
                    <input type="number" id="tdeeValue" step="50" placeholder="2000"
                        class="w-24 text-right"
                        onchange="saveTDEE(this.value); renderScatter()">
                    <span>kcal/dzień</span>
                </div>
            </div>
            <div class="h-[280px]">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="font-semibold mb-4 text-lg">Historia wpisów</h2>
            <div class="max-h-64 overflow-y-auto">
                <table class="w-full text-sm">
                    <thead class="text-xs uppercase opacity-50">
                        <tr class="border-b border-slate-700/50">
                            <th class="py-2 px-4 text-left">Data</th>
                            <th class="py-2 px-4 text-left">Waga</th>
                            <th class="py-2 px-4 text-left">Spożyte</th>
                            <th class="py-2 px-4 text-left">Spalone</th>
                            <th class="py-2 px-4 text-right">Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-slate-900 text-white px-6 py-3 rounded-full border border-slate-700 shadow-2xl z-50 text-center">
        <span id="toastMsg"></span>
    </div>
</body>
</html>
